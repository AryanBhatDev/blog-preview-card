<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <article class="card-wrapper">
      <div class="card">
        <div class="image-wrapper">
          <img src="./assets/images/illustration-article.svg" />
        </div>
        <p class="tag">Learning</p>
        <p class="date">Published 21 Dec 2023</p>
        <h3 class="title">HTML & CSS foundations</h3>
        <p class="description">
          These languages are the backbone of every website, defining structure, content, and
          presentation.
        </p>
        <div class="author-wrapper">
          <img src="./assets/images/image-avatar.webp" />
          <p class="author-name">Greg Hooper</p>
        </div>
      </div>
    </article>

      by <a href="#">Your Name Here</a>.
    </footer> -->
  </body>
</html>
